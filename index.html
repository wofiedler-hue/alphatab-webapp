<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaTab Web App</title>

  <!-- AlphaTab Core (UMD, global verfügbar) -->
  <script src="./alphaTab.min.js"></script>

  <style>
    body { margin:0; font-family: Arial,sans-serif; display:flex; flex-direction:column; height:100vh; background:#111; color:#fff; }
    header { padding:10px 20px; background:#1e1e1e; display:flex; align-items:center; gap:10px; }
    button, input { padding:8px 12px; border-radius:6px; border:none; font-size:14px; }
    button { background:#ff7a18; color:white; cursor:pointer; }
    button:hover { opacity:0.85; }
    #container { flex:1; overflow:auto; padding:20px; background:#fff; color:black; }
    #alphaTab { max-width:1000px; margin:auto; }
    .controls { display:flex; gap:10px; align-items:center; }
    #status { margin-left:10px; font-weight:bold; }
  </style>
</head>
<body>

<header>
  <div class="controls">
    <input type="file" id="fileInput" accept=".gp,.gp3,.gp4,.gp5,.gpx,.xml,.musicxml">
    <button id="loadSampleBtn">Sample laden</button>
    <button id="playPauseBtn">Play / Pause</button>
    <button id="stopBtn">Stop</button>
    <span id="status">Bereit</span>
  </div>
</header>

<div id="container">
  <div id="alphaTab"></div>
</div>

<script>
let api = null;
let ready = false;

function setStatus(t) { document.getElementById("status").innerText = t; }

function initAlphaTab(options) {
  const el = document.getElementById("alphaTab");
  el.innerHTML = "";
  ready = false;
  setStatus("Lade...");

  try {
    // Worker aus demselben Ordner
    const worker = new Worker('./alphaTab.worker.mjs', { type:'module' });

    // AlphaTabApi ist global verfügbar durch alphaTab.min.js
    api = new alphaTab.AlphaTabApi(el, {
      ...options,
      core: { worker },
      player: { enablePlayer:true, soundFont:'./sonivox.sf2' },
      fonts: { bravura: './Bravura.woff2' }
    });

    api.scoreLoaded.on(() => {
      ready = true;
      setStatus("Geladen ✅");
    });

    api.error.on((e) => {
      console.error("AlphaTab Error:", e);
      setStatus("Fehler ❌");
    });

  } catch (err) {
    console.error(err);
    setStatus("Init Fehler ❌");
  }
}

// Datei Upload
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    initAlphaTab({ data: ev.target.result });
  };
  reader.readAsArrayBuffer(file);
});

// Sample laden
function loadSample() {
  const sample = `\\title "Demo Song"\\n\\tempo 120\\n.\\n(0.0 1.0 2.0 3.0)|`;
  initAlphaTab({ tex:true, data:sample });
}

// Play/Pause & Stop
function playPause() { if(api && ready) api.playPause(); }
function stopPlayback() { if(api) api.stop(); }

document.getElementById("loadSampleBtn").addEventListener("click", loadSample);
document.getElementById("playPauseBtn").addEventListener("click", playPause);
document.getElementById("stopBtn").addEventListener("click", stopPlayback);

</script>

</body>
</html>
